# Main Website: trulearnix.com
server {
    listen 80;
    server_name trulearnix.com www.trulearnix.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name trulearnix.com www.trulearnix.com;

    ssl_certificate /etc/letsencrypt/live/trulearnix.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trulearnix.com/privkey.pem;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# Admin Panel: admin.trulearnix.com
server {
    listen 80;
    server_name admin.trulearnix.com;
