<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login - Trulancer</title>
<link rel="stylesheet" href="../_base.css"></head>
<body>
<div style="min-height:100vh;background:var(--bg-secondary);display:flex;align-items:center;justify-content:center;padding:var(--space-4);">
  <div class="card" style="width:100%;max-width:420px;padding:var(--space-8);">
    <div style="text-align:center;margin-bottom:var(--space-6);">
      <div style="font-size:1.75rem;font-weight:800;margin-bottom:var(--space-1);">Welcome Back</div>
      <div style="font-size:.875rem;color:var(--text-muted);">Login to Trulancer</div>
    </div>
    <form>
      <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-input" placeholder="you@example.com"></div>
      <div class="form-group"><label class="form-label">Password</label><input type="password" class="form-input" placeholder="Your password"></div>
      <div style="display:flex;justify-content:flex-end;margin-bottom:var(--space-4);"><a href="#" style="font-size:.875rem;color:var(--primary-600);">Forgot password?</a></div>
      <button type="submit" class="btn btn-primary btn-block">Login</button>
    </form>
    <div style="text-align:center;margin-top:var(--space-4);font-size:.875rem;color:var(--text-muted);">
      New to Trulancer? <a href="register.html" style="color:var(--primary-600);">Create account</a>
    </div>
  </div>
</div></body>
</html>
