<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Register - Trulancer</title>
<link rel="stylesheet" href="../_base.css"></head>
<body>
<div style="min-height:100vh;background:var(--bg-secondary);display:flex;align-items:center;justify-content:center;padding:var(--space-4);">
  <div class="card" style="width:100%;max-width:480px;padding:var(--space-8);">
    <div style="text-align:center;margin-bottom:var(--space-6);">
      <div style="font-size:1.75rem;font-weight:800;margin-bottom:var(--space-1);">Join Trulancer</div>
      <div style="font-size:.875rem;color:var(--text-muted);">Create your free account</div>
    </div>
    <div style="display:flex;gap:var(--space-2);margin-bottom:var(--space-6);">
      <button class="btn btn-primary" style="flex:1;">I am a Freelancer</button>
      <button class="btn btn-outline" style="flex:1;">I want to Hire</button>
    </div>
    <form>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3);">
        <div class="form-group"><label class="form-label">First Name</label><input class="form-input" placeholder="First name"></div>
        <div class="form-group"><label class="form-label">Last Name</label><input class="form-input" placeholder="Last name"></div>
      </div>
      <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-input" placeholder="you@example.com"></div>
      <div class="form-group"><label class="form-label">Phone</label><input type="tel" class="form-input" placeholder="+91 XXXXX XXXXX"></div>
      <div class="form-group"><label class="form-label">Primary Skill</label>
        <select class="form-input"><option>Select your main skill</option><option>Digital Marketing</option><option>Web Development</option><option>Graphic Design</option><option>Content Writing</option><option>Finance & Accounts</option></select>
      </div>
      <div class="form-group"><label class="form-label">Password</label><input type="password" class="form-input" placeholder="Min 8 characters"></div>
      <button type="submit" class="btn btn-primary btn-block">Create Account</button>
    </form>
    <div style="text-align:center;margin-top:var(--space-4);font-size:.875rem;color:var(--text-muted);">
      Already have an account? <a href="login.html" style="color:var(--primary-600);">Login</a>
    </div>
  </div>
</div></body>
</html>
