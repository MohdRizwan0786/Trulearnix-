<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Login – Trulearnix</title>
<link rel="stylesheet" href="../_base.css">
</head>
<body style="background:var(--bg-secondary);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:var(--space-4);">
<div class="card" style="width:100%;max-width:420px;padding:var(--space-8);">
  <div style="text-align:center;margin-bottom:var(--space-6);">
    <div style="font-size:2rem;font-weight:800;color:var(--primary-600);margin-bottom:var(--space-2);">Trulearnix</div>
    <div style="color:var(--text-muted);font-size:.875rem;">Admin Panel — Restricted Access</div>
  </div>
  <form>
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input type="email" class="form-input" placeholder="admin@trulearnix.com">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" class="form-input" placeholder="••••••••">
    </div>
    <div style="display:flex;justify-content:flex-end;margin-bottom:var(--space-4);">
      <a href="#" style="font-size:.875rem;color:var(--primary-600);">Forgot password?</a>
    </div>
    <button type="submit" class="btn btn-primary btn-block">Sign In to Admin</button>
  </form>
  <p style="text-align:center;margin-top:var(--space-4);font-size:.75rem;color:var(--text-muted);">This area is restricted to authorized personnel only.</p>
</div>
</body>
</html>
